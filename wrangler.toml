name = "rachacuca-backend"
main = "worker.js"
compatibility_date = "2024-01-01"

[[durable_objects.bindings]]
name = "RoomDO"
class_name = "RoomDO"
script_name = "rachacuca-backend"

[[durable_objects.bindings]]
name = "RecordesDO"
class_name = "RecordesDO"
script_name = "rachacuca-backend"

[[durable_objects.bindings]]
name = "HistoricoDO"
class_name = "HistoricoDO"
