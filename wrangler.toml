[[migrations]]
tag = "v1"
new_sqlite_classes = ["RoomDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["RecordesDO"]

[[migrations]]
tag = "v3"
new_sqlite_classes = ["HistoricoDO"]